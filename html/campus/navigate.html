<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Navigator | Smart Campus AI</title>
    
    <!-- Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../../css/campus/nav.css">

    <script>
        window.__ENV = {
            SUPABASE_URL: 'https://zetmjnilmdfurkjafwte.supabase.co',
            SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpldG1qbmlsbWRmdXJramFmd3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTQ1NDAsImV4cCI6MjA5MTM3MDU0MH0.7BRTPKLPIefRfH32EOceQ_l9rOFE-j2LX2-v13QKEj8'
        };
    </script>
</head>
<body>
    <!-- Map Container -->
    <div id="map"></div>

    <!-- Top Overlay: Status & Theme -->
    <div class="top-overlay">
        <div class="status-badge">
            <span class="pulse-dot"></span>
            <span id="statusText">시스템 준비 완료</span>
        </div>
        <button id="themeBtn" class="icon-btn" title="테마 변경">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>

    <!-- Left Sidebar: Search & Controls -->
    <aside class="control-panel">
        <div class="panel-header">
            <h1>Campus Navigator</h1>
            <p>Seamless Indoor/Outdoor Routing</p>
        </div>

        <!-- Search Section -->
        <section class="search-section">
            <!-- START POINT -->
            <div class="input-group">
                <label>출발지 (Start)</label>
                <!-- Type Selector (External / Internal) -->
                <div id="startToggle" class="toggle-group">
                    <div class="toggle active" data-type="outdoor">외부</div>
                    <div class="toggle" data-type="indoor">내부</div>
                </div>

                <!-- External Search (Map Click / Text Search) -->
                <div class="search-box">
                    <input type="text" id="startSearch" placeholder="지도 클릭 또는 검색..." autocomplete="off">
                    <div id="startDropdown" class="dropdown-list hidden"></div>
                </div>
                <div class="selection-info" id="startDisplay">지도를 클릭하거나 검색하세요</div>

                <!-- Internal Hierarchy Select (Building > Floor > Node) -->
                <div id="startIndoorBox" class="indoor-controls hidden">
                    <select id="startBuilding"><option value="">건물 선택</option></select>
                    <select id="startFloorSel"><option value="">층 선택</option></select>
                    <select id="startIndoorSel"><option value="">노드 선택</option></select>
                </div>
            </div>

            <hr class="divider">

            <!-- END POINT -->
            <div class="input-group">
                <label>도착지 (Destination)</label>
                <!-- Type Selector (External / Internal) -->
                <div id="endToggle" class="toggle-group">
                    <div class="toggle active" data-type="outdoor">외부</div>
                    <div class="toggle" data-type="indoor">내부</div>
                </div>

                <!-- External Search -->
                <div class="search-box">
                    <input type="text" id="endSearch" placeholder="지도 클릭 또는 검색..." autocomplete="off">
                    <div id="endDropdown" class="dropdown-list hidden"></div>
                </div>
                <div class="selection-info" id="endDisplay">지도를 클릭하거나 검색하세요</div>

                <!-- Internal Hierarchy Select (Building > Floor > Node) -->
                <div id="endIndoorBox" class="indoor-controls hidden">
                    <select id="endBuilding"><option value="">건물 선택</option></select>
                    <select id="endFloorSel"><option value="">층 선택</option></select>
                    <select id="endIndoorSel"><option value="">노드 선택</option></select>
                </div>
            </div>
        </section>

        <!-- Mode Section -->
        <section class="mode-section">
            <label>탐색 모드</label>
            <div class="mode-group">
                <button class="modeBtn active" data-mode="optimal">최적 경로</button>
                <button class="modeBtn" data-mode="fastest">최단 시간</button>
                <button class="modeBtn" data-mode="avoid_stairs">계단 회피</button>
            </div>
        </section>

        <!-- Action Buttons -->
        <section class="action-section">
            <button id="runRoute" class="btn-primary">경로 탐색 시작</button>
            <button id="resetBtn" class="btn-secondary">초기화</button>
        </section>
    </aside>

    <!-- Right Panel: Navigation Details -->
    <aside id="routeDetailCard" class="detail-panel hidden">
        <div class="panel-header">
            <h3>Navigation Details</h3>
            <button id="closeDetail" class="close-btn">&times;</button>
        </div>
        <div id="routeInfoContent" class="route-content">
            <!-- Dynamic content from JS -->
        </div>
        <div id="indoorTransitionBox" class="transition-box hidden">
            <p>실내 구간이 포함되어 있습니다.</p>
            <button id="seeIndoorBtn" class="btn-accent">실내 도면 보기</button>
        </div>
    </aside>

    <!-- Floating Map Controls -->
    <div class="map-controls">
        <button id="toggleLayerBtn" class="icon-btn" title="레이어 전환">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M3 12h18"/></svg>
        </button>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="/js/campus/navigate.js"></script>
</body>
</html>
