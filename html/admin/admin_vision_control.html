<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision Control Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  <style>
    :root {
      /* admin_theme.css 기반 Dark Enterprise Theme */
      --bg-main: #0f172a;           /* Deep Navy */
      --bg-card: rgba(30, 41, 59, 0.7); /* Glassmorphism Card */
      --bg-input: rgba(15, 23, 42, 0.8);
      
      --text-primary: #f8fafc;      /* Off-white */
      --text-secondary: #94a3b8;    /* Slate */
      
      --accent-primary: #3b82f6;    /* Blue */
      --accent-success: #10b981;    /* Green */
      --accent-warning: #f59e0b;    /* Amber */
      --accent-danger: #ef4444;     /* Red */
      
      --border-color: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(12px);
      
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      font-family: 'Pretendard', sans-serif; 
      background: var(--bg-main); 
      color: var(--text-primary);
      line-height: 1.5;
    }

    .container { 
      padding: 24px; 
      display: grid; 
      grid-template-columns: 400px 1fr; 
      gap: 24px; 
      max-width: 1440px; 
      margin: 0 auto; 
    }

    /* Panel - Glassmorphism 적용 */
    .panel { 
      background: var(--bg-card); 
      backdrop-filter: var(--glass-blur);
      border-radius: var(--radius-lg); 
      padding: 24px; 
      box-shadow: var(--shadow); 
      border: 1px solid var(--border-color);
    }
    
    h3 { 
      margin: 0 0 20px 0; 
      font-size: 1.25rem; 
      font-weight: 700; 
      display: flex; 
      align-items: center; 
      gap: 10px;
      color: var(--text-primary);
    }
    
    /* Form Section */
    .form-section { margin-bottom: 24px; }
    .section-label { 
      font-size: 0.75rem; 
      font-weight: 700; 
      color: var(--accent-primary); 
      text-transform: uppercase; 
      margin-bottom: 10px; 
      display: block;
      letter-spacing: 0.05em;
    }

    .row { display: flex; gap: 12px; margin-bottom: 16px; }
    .row > * { flex: 1; }
    
    /* Input Styling - Dark Theme */
    input, select, textarea {
      width: 100%; 
      border: 1px solid var(--border-color); 
      border-radius: var(--radius-sm);
      padding: 10px 14px; 
      font-size: 14px; 
      outline: none; 
      transition: all 0.2s;
      background: var(--bg-input);
      color: var(--text-primary);
    }
    input:focus, select:focus, textarea:focus { 
      border-color: var(--accent-primary); 
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    textarea { min-height: 180px; font-family: 'Fira Code', monospace; }

    /* Buttons - Theme Colors */
    button { 
      border: none; 
      border-radius: var(--radius-sm); 
      padding: 10px 16px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 14px; 
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button:active { transform: scale(0.96); }
    
    .btn-save { background: var(--accent-primary); color: white; width: 100%; margin-top: 12px; }
    .btn-save:hover { background: #2563eb; transform: translateY(-1px); }
    
    .btn-delete { background: rgba(239, 68, 68, 0.15); color: var(--accent-danger); border: 1px solid var(--accent-danger); }
    .btn-delete:hover { background: var(--accent-danger); color: white; }
    
    .btn-validate { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); border: 1px solid var(--border-color); }
    .btn-validate:hover { background: rgba(255, 255, 255, 0.1); }
    
    .btn-new { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); border: 1px solid var(--border-color); }
    
    .btn-success-outline { 
      background: rgba(16, 185, 129, 0.15); 
      color: var(--accent-success); 
      border: 1px solid var(--accent-success);
    }
    .btn-success-outline:hover { background: var(--accent-success); color: white; }

    /* USB Group */
    .usb-group { 
      display: flex; 
      background: var(--bg-input); 
      padding: 4px; 
      border-radius: var(--radius-sm); 
      gap: 4px; 
    }
    .usb-group button { 
      flex: 1; 
      background: transparent; 
      color: var(--text-secondary); 
      padding: 6px; 
      font-size: 12px;
    }
    .usb-group button.active { 
      background: var(--accent-primary); 
      color: white; 
    }

    /* List Container */
    .list-container { 
      max-height: 280px; 
      overflow-y: auto; 
      border-radius: var(--radius-md); 
      margin-bottom: 20px; 
      background: rgba(0, 0, 0, 0.2);
    }
    .list-item { 
      padding: 14px 16px; 
      border-bottom: 1px solid var(--border-color); 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      transition: background 0.2s;
      color: var(--text-primary);
    }
    .list-item:hover { background: rgba(255, 255, 255, 0.05); }
    .list-item.active { 
      background: rgba(59, 130, 246, 0.15); 
      border-left: 4px solid var(--accent-primary); 
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-on { background: var(--accent-success); box-shadow: 0 0 8px var(--accent-success); }
    .dot-off { background: #475569; }
    .item-id { font-weight: 700; font-size: 14px; display: block; }
    .item-sub { font-size: 12px; color: var(--text-secondary); }

    /* Video Preview */
    .video-wrap { 
      background: #000; 
      border-radius: var(--radius-md); 
      overflow: hidden; 
      position: relative; 
      aspect-ratio: 16/9; 
      box-shadow: var(--shadow);
    }
    .video-img { width: 100%; height: 100%; object-fit: contain; }
    .video-overlay { 
      position: absolute; top: 14px; left: 14px; 
      background: rgba(15, 23, 42, 0.85); 
      color: white; padding: 5px 12px; 
      border-radius: 20px; font-size: 12px; 
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Message Box */
    #roi_msg { font-size: 13px; margin-top: 8px; font-weight: 500; }
    .ok { color: var(--accent-success); }
    .err { color: var(--accent-danger); }

    @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
  </style>
</head>

<body>
  <div id="admin-header"></div>

  <div class="container">
    <!-- Left Column: Configuration -->
    <div class="panel">
      <h3>⚙️ 카메라 설정</h3>
      
      <div class="form-section">
        <span class="section-label">기본 정보</span>
        <div class="row">
          <input id="camera_id" placeholder="Camera ID" />
          <input id="camera_name" placeholder="카메라 이름" />
        </div>
        <div class="row">
          <select id="node_scope">
            <option value="indoor">Indoor (실내)</option>
            <option value="outdoor">Outdoor (실외)</option>
          </select>
          <label style="display:flex;align-items:center;gap:8px; font-size:14px; cursor:pointer; margin:0;">
            <input type="checkbox" id="is_active" style="width:auto;" /> 활성 상태
          </label>
        </div>
      </div>

      <div class="form-section">
        <span class="section-label">영상 소스</span>
        <div class="row">
          <input id="video_source" placeholder="Source (0, 1, URL...)" />
          <button id="btn_preview" class="btn-validate" type="button">미리보기</button>
        </div>
        <div class="usb-group">
          <button id="btn_usb_0" class="btn-validate" type="button">USB 0</button>
          <button id="btn_usb_1" class="btn-validate" type="button">USB 1</button>
          <button id="btn_usb_2" class="btn-validate" type="button">USB 2</button>
        </div>
      </div>

      <div class="form-section">
        <span class="section-label">ROI 영역 (JSON)</span>
        <textarea id="roi_json"></textarea>
        <div id="roi_msg">ready</div>
      </div>

      <div class="btn-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button id="btn_new" class="btn-new" type="button">새로 만들기</button>
        <button id="btn_validate" class="btn-validate" type="button">ROI 검증</button>
        <button id="btn_save" class="btn-save" style="grid-column: span 2;" type="button">설정 저장하기</button>
        <button id="btn_delete" class="btn-delete" style="grid-column: span 2;" type="button">이 프로필 삭제</button>
      </div>
    </div>

    <!-- Right Column: List & Monitor -->
    <div class="panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin:0;">📋 프로필 목록 & 모니터링</h3>
        <button id="btn_set_active" class="btn-success-outline" type="button">✨ 현재 프로필 즉시 활성화</button>
      </div>

      <div class="list-container" id="profile_list">
        <!-- JS 렌더링 -->
      </div>

      <div class="form-section">
        <span class="section-label">실시간 모니터링</span>
        <div class="row">
          <input id="preview_url" placeholder="미리보기 URL 직접 입력" />
        </div>
        <div class="video-wrap">
          <div class="video-overlay" id="preview_overlay">No Stream</div>
          <img id="preview_img" class="video-img" alt="stream preview" />
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/admin/admin_vision_control.js"></script>
</body>
</html>
