<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --sub: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      padding: 28px 24px;
    }

    h2 {
      margin: 0 0 6px 0;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .desc {
      margin: 0 0 18px 0;
      color: var(--sub);
      font-size: 14px;
    }

    .field {
      margin-bottom: 12px;
    }

    .label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #374151;
      font-weight: 600;
    }

    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      background: #fff;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    #login-btn {
      width: 100%;
      height: 46px;
      margin-top: 6px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .02s;
    }

    #login-btn:hover { background: var(--primary-hover); }

    #signup-btn {
      width: 100%;
      height: 42px;
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #signup-btn:hover {
      background: #f9fafb;
    }


    #login-btn:active { transform: translateY(1px); }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--sub);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>관리자 로그인</h2>
    <p class="desc">관리자 계정으로 로그인하세요.</p>

    <div class="field">
      <label class="label" for="email">이메일</label>
      <input id="email" type="email" placeholder="admin@example.com" />
    </div>

    <div class="field">
      <label class="label" for="password">비밀번호</label>
      <input id="password" type="password" placeholder="비밀번호 입력" />
    </div>

    <button id="login-btn">로그인</button>
    <button id="signup-btn">회원가입 페이지로 이동</button>

    <div class="hint">권한이 없는 계정은 관리자 페이지 접근이 제한됩니다.</div>

  </div>
