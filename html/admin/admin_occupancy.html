<style>
  /* [Design System] admin_theme.css 기반 Dark Enterprise Theme */
  :root {
    --bg-main: #0f172a;           /* Deep Navy */
    --bg-card: rgba(30, 41, 59, 0.7); /* Glassmorphism Card */
    --bg-input: rgba(15, 23, 42, 0.8);
    
    --text-primary: #f8fafc;      /* Off-white */
    --text-secondary: #94a3b8;    /* Slate */
    
    --accent-primary: #3b82f6;    /* Blue */
    --accent-success: #10b981;    /* Green */
    --accent-warning: #f59e0b;    /* Amber */
    --accent-danger: #ef4444;     /* Red */
    
    --border-color: rgba(255, 255, 255, 0.1);
    --glass-blur: blur(12px);
    
    --radius-lg: 20px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
  }

  body { 
    margin:0; 
    font-family: 'Pretendard', sans-serif; 
    background: var(--bg-main); 
    color: var(--text-primary); 
  }
  .page { max-width: 1400px; margin: 0 auto; padding: 24px; }
  
  /* [Layout] */
  .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
  .section { 
    background: var(--bg-card); 
    border: 1px solid var(--border-color); 
    border-radius: var(--radius-lg); 
    padding: 24px; 
    box-shadow: var(--shadow);
    backdrop-filter: var(--glass-blur);
  }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .section h2 { margin: 0; font-size: 1.25rem; font-weight: 700; color: var(--text-primary); }

  /* [Analysis Settings Panel] */
  .analysis-panel { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
    gap: 16px; 
    background: var(--bg-input);
    padding: 20px;
    border-radius: var(--radius-md);
    margin-bottom: 24px;
    border: 1px solid var(--border-color);
  }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  .filter-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  
  .filter-group select, .filter-group button { 
    padding: 10px; 
    border: 1px solid var(--border-color); 
    border-radius: var(--radius-sm); 
    background: var(--bg-card); 
    color: var(--text-primary);
    font-size: 14px; 
    outline: none;
  }
  .filter-group select:focus { border-color: var(--accent-primary); }

  .btn-primary { 
    background: var(--accent-primary) !important; 
    color: white !important; 
    border: none !important; 
    cursor: pointer; 
    font-weight: 600; 
    transition: all 0.2s;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

  /* [Chart Area] */
  .chart-container { width: 100%; height: 450px; position: relative; }

  /* [Table Style] */
  .table-container { overflow-x: auto; margin-top: 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; color: var(--text-primary); }
  th { 
    background: rgba(255, 255, 255, 0.05); 
    padding: 12px; 
    text-align: left; 
    color: var(--text-secondary); 
    border-bottom: 2px solid var(--border-color); 
  }
  td { padding: 12px; border-bottom: 1px solid var(--border-color); }
  
  /* [Badges] */
  .badge { padding: 4px 10px; border-radius: 999px; font-weight: 700; font-size: 11px; }
  .badge.low { background: rgba(16, 185, 129, 0.2); color: var(--accent-success); }
  .badge.mid { background: rgba(245, 158, 11, 0.2); color: var(--accent-warning); }
  .badge.high { background: rgba(239, 68, 68, 0.2); color: var(--accent-danger); }

  /* [Pagination] */
  .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 16px; }
  .pagination button { 
    padding: 6px 14px; 
    border: 1px solid var(--border-color); 
    border-radius: var(--radius-sm); 
    background: var(--bg-input); 
    color: var(--text-primary);
    cursor: pointer; 
  }
  .pagination button:hover { background: var(--border-color); }

  @media (max-width: 768px) {
    .analysis-panel { grid-template-columns: 1fr; }
    .section-header { flex-direction: column; align-items: flex-start; gap: 12px; }
  }
</style>

</head>

<body>
  <div id="admin-header"></div>

  <div id="admin-content">
    <div class="page">
      <div class="dashboard-grid">
        
        <!-- TOP: 분석 설정 섹션 -->
        <div class="section">
          <div class="section-header">
            <h2>🔍 데이터 분석 설정 (Analysis Engine)</h2>
          </div>
          <div class="analysis-panel">
            <div class="filter-group">
              <label>대상 노드 (Target Node)</label>
              <select id="filter-events-node">
                <option value="all">모든 카메라 (All Nodes)</option>
              </select>
            </div>

            <div class="filter-group">
              <label>분석 차원 (Dimension)</label>
              <select id="filter-analysis-dimension">
                <option value="raw">Raw (시계열 흐름)</option>
                <option value="hour">시간대별 평균 (Hour of Day)</option>
                <option value="weekday">요일별 평균 (Day of Week)</option>
              </select>
            </div>

            <div class="filter-group">
              <label>공간 범위 (Scope)</label>
              <select id="filter-events-scope">
                <option value="">전체 (All)</option>
                <option value="indoor">실내 (Indoor)</option>
                <option value="outdoor">실외 (Outdoor)</option>
              </select>
            </div>

            <div class="filter-group">
              <label>혼잡도 레벨 (Level)</label>
              <select id="filter-events-level">
                <option value="">전체 (All)</option>
                <option value="LOW">LOW</option>
                <option value="MID">MID</option>
                <option value="HIGH">HIGH</option>
              </select>
            </div>

            <div class="filter-group" style="justify-content: flex-end;">
              <button id="btn-refresh-analysis" class="btn-primary">분석 실행 (Run Analysis)</button>
            </div>
          </div>
        </div>

        <!-- MIDDLE: 차트 섹션 -->
        <div class="section">
          <div class="section-header">
            <h2 id="chart-title">📈 실시간 혼잡도 추이</h2>
            <div class="filter-group" style="flex-direction: row; align-items: center;">
              <span style="font-size: 13px; margin-right: 8px;">차트 타입:</span>
              <select id="filter-chart-type" style="padding: 4px 8px;">
                <option value="line">Line (추이)</option>
                <option value="bar">Bar (비교)</option>
              </select>
            </div>
          </div>
          <div class="chart-container">
            <canvas id="occupancy-chart"></canvas>
          </div>
        </div>

        <!-- BOTTOM: 데이터 리스트 섹션 -->
        <div class="section">
          <div class="section-header">
            <h2>📋 최근 이벤트 로그</h2>
          </div>
          <div class="table-container">
            <table id="events-table">
              <thead>
                <tr>
                  <th>Node</th>
                  <th>Scope</th>
                  <th>혼잡도</th>
                  <th>점유율</th>
                  <th>인원</th>
                  <th>각도</th>
                  <th>ROI</th>
                  <th>시각 (Timestamp)</th>
                </tr>
              </thead>
              <tbody>
                <!-- JS로 렌더링 -->
              </tbody>
            </table>
          </div>
          <div class="pagination">
            <button id="btn-prev-events">이전</button>
            <span id="events-page-info">1 / 1</span>
            <button id="btn-next-events">다음</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script type="module" src="/js/admin/admin_occupancy.js"></script>
</body>
</html>
