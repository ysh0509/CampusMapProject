<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera ↔ Mapping | Vision2NE Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    :root {
      --bg-main: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.7);
      --bg-input: rgba(15, 23, 42, 0.8);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #3b82f6;
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      --accent-warning: #f59e0b;
      --border-color: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(12px);
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    body { 
      margin: 0; 
      font-family: 'Pretendard', -apple-system, sans-serif; 
      background: var(--bg-main); 
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    #admin-content { 
      height: calc(100vh - 60px); 
      padding: 24px; 
      box-sizing: border-box; 
    }

    .cam-map-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      height: 100%;
    }

    /* Panel Styles */
    .panel {
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-title {
      margin: 0 0 20px 0;
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Form Elements */
    .form-section { margin-bottom: 20px; }
    .form-label { 
      display: block; 
      font-size: 12px; 
      color: var(--text-secondary); 
      margin-bottom: 6px; 
      font-weight: 600;
    }
    .row { display: flex; gap: 10px; margin-bottom: 12px; }
    .row > * { flex: 1; }

    select, input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 12px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: var(--accent-primary); }
    select option { background: var(--bg-main); color: var(--text-primary); }
    input[readonly] { color: var(--text-secondary); background: rgba(255,255,255,0.05); cursor: not-allowed; }

    /* Buttons */
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
    .btn-full { grid-column: span 2; }

    button {
      padding: 12px;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    #btn_new { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color); }
    #btn_save { background: var(--accent-primary); color: white; }
    #btn_delete { background: var(--accent-danger); color: white; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    /* Status Indicator */
    #status { 
      font-size: 13px; 
      padding: 8px 12px; 
      border-radius: var(--radius-sm); 
      margin-bottom: 15px; 
      background: rgba(255,255,255,0.05);
      text-align: center;
    }

    /* Mapping List */
    .list-header { 
      font-size: 14px; 
      font-weight: 700; 
      color: var(--text-secondary); 
      margin-bottom: 10px; 
      display: flex; 
      justify-content: space-between;
    }
    .list-container {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }
    .list-container::-webkit-scrollbar { width: 4px; }
    .list-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

    .item {
      padding: 14px;
      border-radius: var(--radius-md);
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .item:hover { background: rgba(255, 255, 255, 0.08); }
    .item.active { 
      background: rgba(59, 130, 246, 0.15); 
      border-color: var(--accent-primary); 
    }
    .item-main { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .item-id { font-weight: 700; color: var(--accent-primary); }
    .item-meta { font-size: 11px; color: var(--text-secondary); display: flex; gap: 8px; }

    /* Map Area */
    .map-container {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #000;
    }
    #outdoor-map, #indoor-map { width: 100%; height: 100%; z-index: 1; }

    /* Legend */
    .legend {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-size: 12px;
      border: 1px solid var(--border-color);
      display: flex;
      gap: 16px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .edge { width: 14px; height: 3px; border-radius: 2px; }

    @media (max-width: 1100px) {
      .cam-map-layout { grid-template-columns: 1fr; overflow-y: auto; }
      #admin-content { height: auto; overflow: visible; }
      .panel { height: 550px; }
    }
  </style>
</head>
<body>
  <div id="admin-header"></div>

  <div id="admin-content">
    <div class="cam-map-layout">
      <!-- Left Panel -->
      <div class="panel">
        <h3 class="panel-title"><span>📸</span> 매핑 설정</h3>
        
        <div id="status">ready</div>

        <div class="form-section">
          <label class="form-label">CAMERA SELECTION</label>
          <div class="row">
            <select id="camera_id"></select>
            <select id="target_type" style="width: 100px;">
              <option value="node">Node</option>
              <option value="edge">Edge</option>
            </select>
          </div>
        </div>

        <div class="form-section">
          <label class="form-label">SPATIAL SCOPE</label>
          <div class="row">
            <select id="node_scope">
              <option value="outdoor">Outdoor</option>
              <option value="indoor">Indoor</option>
            </select>
            <input id="selected_target" placeholder="Target ID" readonly />
          </div>
        </div>

        <div class="form-section">
          <label class="form-label">BUILDING & FLOOR (INDOOR ONLY)</label>
          <div class="row">
            <select id="building_id">
              <option value="">건물 선택</option>
            </select>
            <select id="floor_id">
              <option value="">층 선택</option>
            </select>
          </div>
        </div>

        <div class="btn-group">
          <button id="btn_new" type="button">신규</button>
          <button id="btn_save" type="button">저장/수정</button>
          <button id="btn_delete" class="btn-full" type="button">삭제</button>
        </div>

        <div class="list-header">
          <span>EXISTING MAPPINGS</span>
          <span id="mapping_count">0</span>
        </div>
        <div id="map_list" class="list-container"></div>
      </div>

      <!-- Right Panel -->
      <div class="panel" style="padding: 0; position: relative;">
        <!-- Outdoor Map -->
        <div id="outdoor-container" class="map-container">
          <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#3b82f6;"></span>노드</div>
            <div class="legend-item"><span class="edge" style="background:#f59e0b;"></span>엣지</div>
          </div>
          <div id="outdoor-map"></div>
        </div>

        <!-- Indoor Map -->
        <div id="indoor-container" class="map-container" style="display:none;">
          <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#10b981;"></span>노드</div>
            <div class="legend-item"><span class="edge" style="background:#ef4444;"></span>엣지</div>
          </div>
          <div id="indoor-map"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="/js/admin/admin_camera_map.js"></script>
</body>
</html>
