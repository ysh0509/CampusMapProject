<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin | Smart Campus</title>
  <link rel="stylesheet" href="sadmin.css"> <!-- 상기 CSS 적용 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <div class="main-container">
    <header>
      <h1><i class="fas fa-shield-halved"></i> Super Admin Dashboard</h1>
      <button class="btn-danger" onclick="location.href='index.html'">
        <i class="fas fa-arrow-left"></i> Exit Dashboard
      </button>
    </header>

    <!-- Section 1: Admin Management -->
    <div class="grid-layout">
      <!-- Admin Creation Card -->
      <section class="card">
        <h2><i class="fas fa-user-plus"></i> Create New Administrator</h2>
        <div class="input-group">
          <input type="email" id="new-email" placeholder="Email Address" />
          <input type="password" id="new-password" placeholder="Password" />
          <select id="new-role">
            <option value="admin">Admin Role</option>
            <option value="superadmin">Super Admin Role</option>
          </select>
          <button id="create-admin-btn" class="btn-primary">Generate Account</button>
        </div>
      </section>

      <!-- Stats Summary (신설: UX 개선용) -->
      <section class="card">
        <h2><i class="fas fa-chart-pie"></i> System Summary</h2>
        <div style="display: flex; justify-content: space-around; text-align: center;">
          <div>
            <div style="font-size: 1.5rem; font-weight: bold;" id="total-admins">0</div>
            <div style="color: var(--text-secondary); font-size: 0.8rem;">Total Admins</div>
          </div>
          <div>
            <div style="font-size: 1.5rem; font-weight: bold; color: var(--accent-danger);" id="total-logs">0</div>
            <div style="color: var(--text-secondary); font-size: 0.8rem;">Events Today</div>
          </div>
        </div>
      </section>
    </div>

    <!-- Section 2: Tables -->
    <div class="grid-layout">
      <!-- Admin List Table -->
      <section class="card" style="grid-column: span 2;">
        <h2><i class="fas fa-users"></i> Administrator Directory</h2>
        <table>
          <thead>
            <tr>
              <th>Email Address</th>
              <th>Role Level</th>
              <th>Account Created</th>
              <th style="text-align: right;">Management</th>
            </tr>
          </thead>
          <tbody id="admin-table-body">
            <!-- JS Injection -->
          </tbody>
        </table>
      </section>

      <!-- Admin Logs Table -->
      <section class="card" style="grid-column: span 2;">
        <h2><i class="fas fa-list-ul"></i> System Audit Logs</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Action Performed</th>
              <th>Description</th>
              <th>Timestamp</th>
            </tr>
          </thead>
          <tbody id="log-table-body">
            <!-- JS Injection -->
          </tbody>
        </table>
      </section>
    </div>
  </div>

  <script type="module" src="/js/admin/sadmin.js"></script>
</body>
</html>
