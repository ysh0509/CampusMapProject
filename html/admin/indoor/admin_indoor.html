<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indoor Admin | Smart Campus</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- Google Fonts: Pretendard 대체용 Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* admin_theme.css 기반 Dark Enterprise Theme */
    --bg-main: #0f172a;           /* Deep Navy */
    --bg-card: rgba(30, 41, 59, 0.7); /* Glassmorphism Card */
    --bg-input: rgba(15, 23, 42, 0.8);
    
    --text-primary: #f8fafc;      /* Off-white */
    --text-secondary: #94a3b8;    /* Slate */
    
    --accent-primary: #3b82f6;    /* Blue */
    --accent-success: #10b981;    /* Green */
    --accent-warning: #f59e0b;    /* Amber */
    --accent-danger: #ef4444;     /* Red */
    
    --border-color: rgba(255, 255, 255, 0.1);
    --glass-blur: blur(12px);
    
    --radius-lg: 20px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
  }

  * { box-sizing: border-box; font-family: 'Inter', 'Pretendard', system-ui, -apple-system, sans-serif; }
  body { margin: 0; background: var(--bg-main); color: var(--text-primary); overflow: hidden; }

  #admin-content { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }
  #app { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar Styling - Glassmorphism 적용 */
  #sidebar {
    width: 380px;
    background: var(--bg-card);
    backdrop-filter: var(--glass-blur);
    border-right: 1px solid var(--border-color);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto;
    box-shadow: 2px 0 10px rgba(0,0,0,0.2);
  }

  h1 { margin: 0; font-size: 22px; font-weight: 700; color: var(--accent-primary); letter-spacing: -0.5px; }
  h3 { margin: 0 0 12px 0; font-size: 14px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Tab Navigation */
  .tabs { 
    display: flex; 
    background: var(--bg-input); 
    padding: 4px; 
    border-radius: 12px; 
    gap: 4px; 
  }
  .tab {
    flex: 1;
    padding: 8px 4px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    transition: all 0.2s ease;
  }
  .tab.active { 
    background: var(--accent-primary); 
    color: white; 
    box-shadow: var(--shadow);
  }

  /* Section & Card Styling */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 20px;
    box-shadow: var(--shadow);
    backdrop-filter: var(--glass-blur);
  }

  .row { display: flex; gap: 10px; margin-bottom: 12px; }
  .row > div { flex: 1; }

  /* Input & Select Styling - Dark Theme */
  input, select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    font-size: 14px;
    background: var(--bg-input);
    color: var(--text-primary);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus, select:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
  }
  input::placeholder { color: #475569; }

  /* Button Styling - Dark Theme */
  #sidebar button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  /* Primary Action Buttons */
  #sidebar button#btnAddBuilding, 
  #sidebar button#btnAddFloor, 
  #sidebar button#btnLoadFloor, 
  #sidebar button#btnUploadImage {
    background: var(--accent-primary);
    color: white;
    margin-top: 8px;
  }

  #sidebar button#btnAddBuilding:hover, 
  #sidebar button#btnAddFloor:hover, 
  #sidebar button#btnLoadFloor:hover, 
  #sidebar button#btnUploadImage:hover {
    background: #2563eb;
    transform: translateY(-1px);
  }

  /* Secondary Action Buttons */
  #sidebar button.secondary {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
  }

  #sidebar button.secondary:hover {
    background: rgba(255, 255, 255, 0.1);
  }

  /* Delete Button */
  #sidebar button#btn_delete, 
  #sidebar button.btn-delete { 
    background: rgba(239, 68, 68, 0.15); 
    color: var(--accent-danger); 
    border: 1px solid var(--accent-danger);
  }
  #sidebar button#btn_delete:hover,
  #sidebar button.btn-delete:hover { 
    background: var(--accent-danger); 
    color: white; 
  }

  /* Success/Outline Buttons */
  #sidebar button.btn-success-outline { 
    background: rgba(16, 185, 129, 0.15); 
    color: var(--accent-success); 
    border: 1px solid var(--accent-success);
  }
  #sidebar button.btn-success-outline:hover { 
    background: var(--accent-success); 
    color: white; 
  }

  /* List & Item Styling */
  .list {
    max-height: 300px;
    overflow-y: auto;
    margin-top: 8px;
  }
  .item {
    padding: 12px;
    border-bottom: 1px solid var(--border-color);
    font-size: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    color: var(--text-primary);
  }
  .item:last-child { border-bottom: none; }
  .item-info { font-weight: 500; color: var(--text-primary); }
  .item-actions { display: flex; gap: 6px; }
  .item-actions button { 
    width: auto; 
    padding: 6px 12px; 
    font-size: 12px; 
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-secondary);
    border: 1px solid var(--border-color);
  }
  .item-actions button:hover {
    background: rgba(255, 255, 255, 0.1);
    color: white;
  }

  /* Tools Box */
  .tools-box {
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: var(--radius-md);
    padding: 12px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .tools-box div { display: flex; align-items: center; gap: 6px; }
  .tools-box span { font-weight: 700; color: var(--accent-primary); }

  /* Map Area */
  #map { flex: 1; background: #0f172a; }

  /* Status Floating Bar */
  #status-container {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2000;
    pointer-events: none;
  }

  #status {
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(10px);
    color: #f8fafc;
    padding: 10px 24px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.1);
    min-width: 120px;
    text-align: center;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

  @media (max-width: 768px) {
    #sidebar { width: 100%; position: absolute; height: 50%; z-index: 2000; }
    #app { flex-direction: column; }
  }
</style>

</head>
<body>
  <div id="admin-header"></div>

  <div id="admin-content">
    <div id="app">
      <!-- Sidebar -->
      <aside id="sidebar">
        <h1>Indoor Admin</h1>

        <!-- Tab Navigation -->
        <nav class="tabs">
          <div class="tab active" data-mode="floor_new">등록</div>
          <div class="tab" data-mode="floor_manage">관리</div>
          <div class="tab" data-mode="edit">편집</div>
        </nav>

        <!-- View: Floor Registration -->
        <div id="view-floor_new" class="view">
          <div class="section">
            <h3>건물 설정</h3>
            <div class="row">
              <input id="bName" placeholder="새 건물 이름 입력" />
            </div>
            <button id="btnAddBuilding">건물 추가</button>
          </div>

          <div class="section" style="margin-top: 16px;">
            <h3>평면도 업로드</h3>
            <div class="row">
              <select id="fBuildingSel">
                <option value="">건물 선택</option>
              </select>
              <input id="fFloorNum" placeholder="층 (예: 1)" type="number" />
            </div>
            <div style="margin-bottom: 12px;">
              <input type="file" id="floorImageFile" accept="image/*" style="font-size: 12px; padding: 8px;" />
            </div>
            <button id="btnUploadImage" class="secondary">이미지 서버 업로드</button>
            <input id="fImageUrl" placeholder="업로드된 URL (자동 입력)" style="margin-top: 8px;" />
            <button id="btnAddFloor" style="margin-top: 12px;">평면도 등록 완료</button>
          </div>
        </div>

        <!-- View: Floor Management -->
        <div id="view-floor_manage" class="view" style="display:none;">
          <div class="section">
            <h3>필터링</h3>
            <div class="row">
              <input id="searchBuilding" placeholder="건물 ID" />
              <input id="searchFloor" placeholder="층" />
            </div>
            <div id="floorList" class="list">
              <!-- Items injected by JS -->
            </div>
          </div>
        </div>

        <!-- View: Node/Edge Editing -->
        <div id="view-edit" class="view" style="display:none;">
          <div class="section">
            <h3>편집 대상 선택</h3>
            <div class="row">
              <select id="selBuildingSel">
                <option value="">건물 선택</option>
              </select>
              <input id="selFloor" placeholder="층" type="number" />
            </div>
            <button id="btnLoadFloor">데이터 불러오기</button>
          </div>

          <div class="section" style="margin-top: 16px;">
            <h3>조작 가이드</h3>
            <div class="tools-box">
              <div><span>• 더블클릭:</span> 노드(지점) 추가</div>
              <div><span>• 드래그:</span> 노드 위치 이동</div>
              <div><span>• 2회 클릭:</span> 엣지(경로) 생성/수정</div>
              <div><span>• ESC:</span> 선택 상태 초기화</div>
            </div>
          </div>
        </div>

        <!-- Status Bar (Bottom of Sidebar) -->
        <div id="status-container">
          <div id="status">Ready</div>
        </div>
      </aside>

      <!-- Map Area -->
      <main id="map"></main>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="/js/admin/indoor/admin_indoor.js"></script>
</body>
</html>
