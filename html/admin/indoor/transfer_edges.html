<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Transfer Edge Manager</title>
  <link rel="stylesheet" href="../admin_theme.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body, html { height: 100%; overflow: hidden; }
    #admin-content { display: flex; height: calc(100vh - 64px); }
    #map { flex: 1; }
    #panel {
      width: 400px;
      overflow-y: auto;
      border-left: 1px solid var(--border-color);
    }
    .status-box {
      background: var(--bg-input);
      padding: 12px;
      border-radius: var(--radius-md);
      margin-bottom: 15px;
      font-size: 0.85rem;
      border: 1px solid var(--border-color);
    }
    #floorWrapper {
      position: relative;
      width: 100%;
      min-height: 300px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: auto;
      background: #111;
      margin-top: 10px;
    }
    #floorImage { display: block; max-width: none; }
    .indoorNode {
      position: absolute; width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent-primary); border: 2px solid white;
      transform: translate(-50%, -50%); cursor: pointer; z-index: 100;
    }
    .indoorNode.active { background: var(--accent-danger); }
    .section-title { font-size: 0.9rem; color: var(--accent-primary); text-transform: uppercase; margin-bottom: 10px; display: block; }
  </style>
</head>
<body>
  <div id="admin-header"></div>
  <div id="admin-content">
    <div id="map"></div>
    <div id="panel" class="card">
      <h2 style="font-size: 1.2rem;"><i class="fas fa-exchange-alt"></i> Transfer Manager</h2>
      
      <span class="section-title">Selected Outdoor Node</span>
      <div id="outdoorSelected" class="status-box">없음</div>

      <span class="section-title">Selected Indoor Node</span>
      <div id="indoorSelected" class="status-box">없음</div>

      <div class="field">
        <label class="label">건물 선택</label>
        <select id="buildingSelect"></select>
      </div>

      <div class="field">
        <label class="label">층 선택</label>
        <select id="floorSelect"></select>
      </div>

      <div class="field">
        <label class="label">강의실 검색</label>
        <input type="text" id="roomSearch" placeholder="강의실 번호 검색" />
      </div>

      <span class="section-title">Floor Plan</span>
      <div id="floorWrapper">
        <img id="floorImage"/>
      </div>

      <button id="createBtn" class="btn-primary" style="width: 100%; margin-top: 20px;">연결 생성</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="/js/admin/indoor/transfer_edges.js"></script>
</body>
</html>
