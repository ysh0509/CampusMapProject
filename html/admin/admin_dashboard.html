<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 대시보드 | 스마트 캠퍼스</title>
  <link rel="stylesheet" href="/admin.css" />
  <style>
    /* 
       [Design System] 
       현대적인 UI를 위해 CSS 변수를 사용합니다. 
    */
    :root {
      --bg-main: #f8fafc;           /* 전체 배경색 (매우 밝은 회색) */
      --card-bg: #ffffff;           /* 카드 배경색 (흰색) */
      --text-primary: #1e293b;      /* 주 텍스트 색상 (어두운 남색) */
      --text-secondary: #64748b;    /* 부 텍스트 색상 (회색) */
      --accent-blue: #2563eb;       /* 포인트 컬러 (파란색) */
      --accent-dark: #0f172a;       /* 강조 컬러 (진한 남색) */
      --status-low: #22c55e;        /* LOW 상태 (초록색) */
      --status-mid: #f59e0b;        /* MID 상태 (노란색) */
      --status-high: #ef4444;       /* HIGH 상태 (빨간색) */
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); /* 부드러운 그림자 */
    }

    body { 
      margin: 0; 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
      background: var(--bg-main); 
      color: var(--text-primary); 
    }

    .container { 
      padding: 32px; 
      max-width: 1600px; 
      margin: 0 auto; 
    }

    h2 { 
      font-size: 1.75rem; 
      font-weight: 700; 
      margin-bottom: 24px; 
      display: flex; 
      align-items: center; 
      gap: 10px; 
    }

    /* 
       [Grid System - 통계 카드] 
       - 카드 너비 최적화: minmax를 150px로 낮추어 6개의 카드가 한 줄에 배치되도록 유도
       - 하단 여백(margin-bottom)을 40px로 설정하여 빠른 이동 메뉴와의 간격 확보
    */
    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
      gap: 16px; 
      margin-bottom: 40px; 
    }

    .card { 
      background: var(--card-bg); 
      border-radius: 16px; 
      padding: 20px; 
      box-shadow: var(--shadow); 
      border: 1px solid #e2e8f0;
      transition: transform 0.2s ease;
    }
    .card:hover { transform: translateY(-4px); }
    .card h3 { font-size: 0.85rem; color: var(--text-secondary); margin: 0 0 8px 0; font-weight: 500; }
    .card .value { font-size: 1.75rem; font-weight: 800; color: var(--accent-dark); }

    /* 
       [Quick Actions - 빠른 이동 메뉴] 
       - 메뉴 영역을 별도의 섹션처럼 보이게 하여 시각적 분리
       - 상단/하단 여백을 충분히 주어 통계 카드 및 관제 섹션과 붙지 않게 함
    */
    .section-actions {
      margin-bottom: 40px;
      padding: 16px 24px;
      background: #f1f5f9; /* 연한 배경색으로 영역 구분 */
      border-radius: 12px;
      border: 1px solid #e2e8f0;
    }

    .actions { 
      display: flex; 
      gap: 12px; 
      flex-wrap: wrap; /* 화면이 좁아지면 버튼도 줄바꿈 */
    }

    .actions button {
      padding: 10px 20px; 
      border-radius: 10px; 
      border: 1px solid #e2e8f0; 
      background: var(--card-bg); 
      color: var(--text-primary);
      font-weight: 600; 
      cursor: pointer;
      transition: all 0.2s;
    }
    .actions button:hover { 
      background: var(--accent-blue); 
      color: white; 
      border-color: var(--accent-blue); 
      transform: translateY(-2px);
    }

    /* 
       [Realtime Monitoring - 실시간 관제 섹션] 
    */
    .realtime-wrap { 
      display: grid; 
      grid-template-columns: 1.2fr 0.8fr; 
      gap: 24px; 
    }
    .panel { 
      background: var(--card-bg); 
      border-radius: 16px; 
      padding: 24px; 
      box-shadow: var(--shadow); 
      border: 1px solid #e2e8f0; 
    }
    .panel h4 { margin: 0 0 16px 0; font-size: 1.1rem; color: var(--text-primary); }

    /* 비디오 스테이지 디자인 */
    .video-stage { 
      position: relative; 
      width: 100%; 
      border-radius: 12px; 
      overflow: hidden; 
      background: #000; 
      aspect-ratio: 16/9; 
    }
    #live-stream-view { width: 100%; height: 100%; object-fit: contain; }
    #overlay-layer { position: absolute; inset: 0; pointer-events: none; }

    /* 영상 위 오버레이 칩 (노드 정보) */
    .overlay-chip {
      position: absolute; 
      min-width: 140px; 
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(4px); 
      color: white; 
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; 
      padding: 10px; 
      font-size: 12px; 
      pointer-events: auto; 
      cursor: move;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }
    .overlay-chip.stale { opacity: 0.5; filter: grayscale(0.5); } /* 데이터가 오래되면 흐리게 */
    
    .chip-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; margin-top: 4px; }
    .chip-low { background: #dcfce7; color: #166534; }
    .chip-mid { background: #fef3c7; color: #92400e; }
    .chip-high { background: #fee2e2; color: #991b1b; }

    /* 스트림 컨트롤 바 */
    .stream-controls { display: flex; gap: 8px; margin-bottom: 16px; }
    .stream-controls input { flex: 1; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; }
    .stream-controls button { padding: 10px 18px; border: none; border-radius: 8px; background: var(--accent-dark); color: white; cursor: pointer; }

    /* 
       [Bottom Analytics - 하단 분석 섹션] 
    */
    .section-row3 { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 24px; 
      margin-top: 32px; 
    }
    .panel-box { 
      background: var(--card-bg); 
      border-radius: 16px; 
      padding: 20px; 
      box-shadow: var(--shadow); 
      border: 1px solid #e2e8f0; 
    }
    .panel-box h3 { font-size: 1rem; margin-bottom: 16px; color: var(--text-primary); }
    .list { height: 280px; overflow-y: auto; border-radius: 8px; }
    .item { padding: 12px; border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
    .item:hover { background: #f8fafc; }
    
    /* 경고/위험 항목 스타일 */
    .item.danger { color: var(--status-high); border-left: 4px solid var(--status-high); }
    .item.warn { color: var(--status-mid); border-left: 4px solid var(--status-mid); }
    .item.ok { color: var(--status-low); border-left: 4px solid var(--status-low); }

    /* 페이징 버튼 */
    .pager { margin-top: 16px; display: flex; justify-content: flex-end; align-items: center; gap: 12px; font-size: 14px; }
    .pager button { padding: 6px 12px; border-radius: 6px; border: 1px solid #e2e8f0; background: white; cursor: pointer; }

    /* 반응형 레이아웃: 화면이 좁아지면 1열로 변경 */
    @media (max-width: 1200px) {
      .realtime-wrap, .section-row3 { grid-template-columns: 1fr; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <div id="admin-header"></div>
  <div class="container">
    <h2>📊 관리자 통합 관제 대시보드</h2>

    <!-- 1. 통계 섹션 (내부 노드/엣지 카드 포함) -->
    <div class="grid">
      <div class="card"><h3>🌐 외부 노드</h3><div id="outdoor-node-count" class="value">-</div></div>
      <div class="card"><h3>🛣️ 외부 엣지</h3><div id="outdoor-edge-count" class="value">-</div></div>
      <div class="card"><h3>🏠 내부 노드</h3><div id="indoor-node-count" class="value">-</div></div> <!-- 신설 -->
      <div class="card"><h3>➰ 내부 엣지</h3><div id="indoor-edge-count" class="value">-</div></div> <!-- 신설 -->
      <div class="card"><h3>🏢 건물 수</h3><div id="building-count" class="value">-</div></div>
      <div class="card"><h3>🏢 층 수</h3><div id="floor-count" class="value">-</div></div>
    </div>

    <!-- 2. 빠른 이동 메뉴 섹션 (간격 문제 해결을 위해 별도 컨테이너 적용) -->
    <div class="section-actions">
      <div class="actions">
        <button onclick="goOutdoor()">🌐 외부 지도</button>
        <button onclick="goIndoor()">🏠 실내 지도</button>
        <button onclick="goVisionControl()">👁️ 실시간 관제</button>
      </div>
    </div>

    <!-- 3. 실시간 관제 메인 섹션 -->
    <div class="section">
      <div class="realtime-wrap">
        <!-- 라이브 영상 패널 -->
        <div class="panel">
          <h4>🎥 라이브 스트리밍 & 오버레이</h4>
          <div class="stream-controls">
            <input id="stream-url" placeholder="스트림 URL을 입력하세요 (예: http://...)" />
            <button id="apply-stream-btn">적용</button>
          </div>
          <div class="video-stage" id="video-stage">
            <img id="live-stream-view" alt="라이브 영상이 여기에 표시됩니다." />
            <div id="overlay-layer"></div>
          </div>
          <p style="font-size: 12px; color: var(--text-secondary); margin-top: 12px;">
            💡 칩을 드래그하여 위치를 조정하면 브라우저에 저장됩니다.
          </p>
        </div>

        <!-- 노드 상태 리스트 패널 -->
        <div class="panel">
          <h4>📍 노드 실시간 상태</h4>
          <div id="node-status-list" class="list">
            <div class="item" style="color: var(--text-secondary);">데이터 로딩 중...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 4. 분석 및 로그 섹션 -->
    <div class="section-row3">
      <!-- 로그 패널 -->
      <div class="panel-box">
        <h3>🕒 시스템 활동 로그</h3>
        <div id="recent-logs" class="list"></div>
        <div class="pager">
          <button id="logs-prev">이전</button>
          <span id="logs-page-info">1 / 1</span>
          <button id="logs-next">다음</button>
        </div>
      </div>

      <!-- 이상 탐지 패널 -->
      <div class="panel-box">
        <h3>🚨 데이터 무결성 검사</h3>
        <div id="data-issues" class="list"></div>
      </div>

      <!-- 경로 분석 패널 -->
      <div class="panel-box">
        <h3>📈 경로 품질 분석</h3>
        <div id="path-analysis" class="list"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/admin/admin_dashboard.js"></script>
</body>
</html>
