<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <title>관리자 대시보드 | 스마트 캠퍼스</title>
<style>
  /* [Design System] admin_theme.css 기반 이식 */
  :root {
    --bg-main: #0f172a;           /* Deep Navy */
    --bg-card: rgba(30, 41, 59, 0.7); /* Glassmorphism Card */
    --bg-input: rgba(15, 23, 42, 0.8);
    
    --text-primary: #f8fafc;      /* Off-white */
    --text-secondary: #94a3b8;    /* Slate */
    
    --accent-primary: #3b82f6;    /* Blue */
    --accent-success: #10b981;    /* Green */
    --accent-warning: #f59e0b;    /* Amber */
    --accent-danger: #ef4444;     /* Red */
    
    --border-color: rgba(255, 255, 255, 0.1);
    --glass-blur: blur(12px);
    
    --radius-lg: 20px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
  }

  body { 
    margin: 0; 
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
    background: var(--bg-main); 
    color: var(--text-primary);
    line-height: 1.5;
  }

  .container { 
    padding: 32px; 
    max-width: 1600px; 
    margin: 0 auto; 
  }

  h2 { 
    font-size: 1.75rem; 
    font-weight: 700; 
    margin-bottom: 24px; 
    display: flex; 
    align-items: center; 
    gap: 10px;
    color: var(--text-primary);
  }

  /* [Grid System] 배치는 유지, 스타일만 변경 */
  .grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
    gap: 16px; 
    margin-bottom: 40px; 
  }

  .card { 
    background: var(--bg-card); 
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 20px; 
    box-shadow: var(--shadow);
    transition: transform 0.2s ease;
  }
  .card:hover { transform: translateY(-4px); }
  .card h3 { font-size: 0.85rem; color: var(--text-secondary); margin: 0 0 8px 0; font-weight: 500; }
  .card .value { font-size: 1.75rem; font-weight: 800; color: var(--text-primary); }

  /* [Quick Actions] */
  .section-actions {
    margin-bottom: 40px;
    padding: 16px 24px;
    background: var(--bg-card);
    border-radius: var(--radius-md);
    border: 1px solid var(--border-color);
    backdrop-filter: var(--glass-blur);
  }

  .actions { 
    display: flex; 
    gap: 12px; 
    flex-wrap: wrap; 
  }

  .actions button {
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-color);
    background: var(--bg-input);
    color: var(--text-primary);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .actions button:hover { 
    background: var(--accent-primary); 
    color: white; 
    transform: translateY(-2px);
  }

  /* [Realtime Monitoring] */
  .realtime-wrap { 
    display: grid; 
    grid-template-columns: 1.2fr 0.8fr; 
    gap: 24px; 
  }
  .panel { 
    background: var(--bg-card); 
    backdrop-filter: var(--glass-blur);
    border-radius: var(--radius-lg);
    padding: 24px; 
    box-shadow: var(--shadow);
    border: 1px solid var(--border-color);
  }
  .panel h4 { margin: 0 0 16px 0; font-size: 1.1rem; color: var(--text-primary); }

  /* Video Stage */
  .video-stage { 
    position: relative; 
    width: 100%; 
    border-radius: var(--radius-md);
    overflow: hidden; 
    background: #000; 
    aspect-ratio: 16/9; 
  }
  #live-stream-view { width: 100%; height: 100%; object-fit: contain; }

  /* Stream Controls */
  .stream-controls { display: flex; gap: 8px; margin-bottom: 16px; }
  .stream-controls input { 
    flex: 1; 
    padding: 10px 14px; 
    background: var(--bg-input);
    border: 1px solid var(--border-color); 
    border-radius: var(--radius-sm); 
    color: var(--text-primary);
    outline: none; 
  }
  .stream-controls button { 
    padding: 10px 18px; 
    border: none; 
    border-radius: var(--radius-sm); 
    background: var(--accent-primary); 
    color: white; 
    cursor: pointer; 
  }

  /* [Bottom Analytics] */
  .section-row3 { 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 24px; 
    margin-top: 32px; 
  }
  .panel-box { 
    background: var(--bg-card); 
    backdrop-filter: var(--glass-blur);
    border-radius: var(--radius-lg);
    padding: 20px; 
    box-shadow: var(--shadow);
    border: 1px solid var(--border-color);
  }
  .panel-box h3 { font-size: 1rem; margin-bottom: 16px; color: var(--text-primary); }
  
  .list { height: 280px; overflow-y: auto; border-radius: var(--radius-sm); }
  .item { 
    padding: 12px; 
    border-bottom: 1px solid var(--border-color); 
    transition: background 0.2s; 
    color: var(--text-primary);
  }
  .item:hover { background: rgba(255, 255, 255, 0.05); }
  
  /* Status Colors (Refined for Dark Theme) */
  .item.danger { color: var(--accent-danger); border-left: 4px solid var(--accent-danger); }
  .item.warn { color: var(--accent-warning); border-left: 4px solid var(--accent-warning); }
  .item.ok { color: var(--accent-success); border-left: 4px solid var(--accent-success); }

  /* Pager */
  .pager { margin-top: 16px; display: flex; justify-content: flex-end; align-items: center; gap: 12px; font-size: 14px; color: var(--text-secondary); }
  .pager button { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-primary); cursor: pointer; }

  @media (max-width: 1200px) {
    .realtime-wrap, .section-row3 { grid-template-columns: 1fr; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>

</head>
<body>
  <div id="admin-header"></div>
  <div class="container">
    <h2>📊 관리자 통합 관제 대시보드</h2>

    <!-- 1. 통계 섹션 (내부 노드/엣지 카드 포함) -->
    <div class="grid">
      <div class="card"><h3>🌐 외부 노드</h3><div id="outdoor-node-count" class="value">-</div></div>
      <div class="card"><h3>🛣️ 외부 엣지</h3><div id="outdoor-edge-count" class="value">-</div></div>
      <div class="card"><h3>🏠 내부 노드</h3><div id="indoor-node-count" class="value">-</div></div> <!-- 신설 -->
      <div class="card"><h3>➰ 내부 엣지</h3><div id="indoor-edge-count" class="value">-</div></div> <!-- 신설 -->
      <div class="card"><h3>🏢 건물 수</h3><div id="building-count" class="value">-</div></div>
      <div class="card"><h3>🏢 층 수</h3><div id="floor-count" class="value">-</div></div>
    </div>

    <!-- 2. 빠른 이동 메뉴 섹션 (간격 문제 해결을 위해 별도 컨테이너 적용) -->
    <div class="section-actions">
      <div class="actions">
        <button onclick="goOutdoor()">🌐 외부 지도</button>
        <button onclick="goIndoor()">🏠 실내 지도</button>
        <button onclick="goVisionControl()">👁️ 실시간 관제</button>
      </div>
    </div>

    <!-- 3. 실시간 관제 메인 섹션 -->
    <div class="section">
      <div class="realtime-wrap">
        <!-- 라이브 영상 패널 -->
        <div class="panel">
          <h4>🎥 라이브 스트리밍 & 오버레이</h4>
          <div class="stream-controls">
            <input id="stream-url" placeholder="스트림 URL을 입력하세요 (예: http://...)" />
            <button id="apply-stream-btn">적용</button>
          </div>
          <div class="video-stage" id="video-stage">
            <img id="live-stream-view" alt="라이브 영상이 여기에 표시됩니다." />
            <div id="overlay-layer"></div>
          </div>
          <p style="font-size: 12px; color: var(--text-secondary); margin-top: 12px;">
            💡 칩을 드래그하여 위치를 조정하면 브라우저에 저장됩니다.
          </p>
        </div>

        <!-- 노드 상태 리스트 패널 -->
        <div class="panel">
          <h4>📍 노드 실시간 상태</h4>
          <div id="node-status-list" class="list">
            <div class="item" style="color: var(--text-secondary);">데이터 로딩 중...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 4. 분석 및 로그 섹션 -->
    <div class="section-row3">
      <!-- 로그 패널 -->
      <div class="panel-box">
        <h3>🕒 시스템 활동 로그</h3>
        <div id="recent-logs" class="list"></div>
        <div class="pager">
          <button id="logs-prev">이전</button>
          <span id="logs-page-info">1 / 1</span>
          <button id="logs-next">다음</button>
        </div>
      </div>

      <!-- 이상 탐지 패널 -->
      <div class="panel-box">
        <h3>🚨 데이터 무결성 검사</h3>
        <div id="data-issues" class="list"></div>
      </div>

      <!-- 경로 분석 패널 -->
      <div class="panel-box">
        <h3>📈 경로 품질 분석</h3>
        <div id="path-analysis" class="list"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/admin/admin_dashboard.js"></script>
</body>
</html>
