<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Elevation Editor</title>
  <link rel="stylesheet" href="../admin_theme.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body, html { height: 100%; margin: 0; }
    #map { height: 100vh; width: 100vw; }
    .editor-panel {
      position: absolute; top: 80px; left: 20px; z-index: 3000;
      width: 280px;
    }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
    .info-row { display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="admin-header"></div>
  <div id="map"></div>

  <div class="editor-panel card">
    <h3 style="font-size: 1.1rem;"><i class="fas fa-layer-group"></i> Elevation Editor</h3>
    
    <div class="field">
      <label class="label">Set Elevation (meters)</label>
      <input id="elevation-input" type="number" placeholder="0.0" />
    </div>

    <div class="btn-grid">
      <button onclick="selectAllNodes()" class="btn-outline">전체 선택</button>
      <button onclick="clearSelection()" class="btn-outline">선택 해제</button>
      <button onclick="applyElevation()" class="btn-primary">적용</button>
      <button onclick="autoFillElevation()" class="btn-outline">자동 입력</button>
    </div>

    <div class="btn-grid">
      <button onclick="selectNoElevation()" class="btn-outline">미입력 선택</button>
      <button onclick="lockNodes()" class="btn-outline">잠금 🔒</button>
      <button onclick="unlockNodes()" class="btn-outline" style="grid-column: span 2;">잠금 해제 🔓</button>
    </div>

    <div class="info-row">
      <span class="text-dim">선택된 노드:</span>
      <span id="selection-info" style="color: var(--accent-primary); font-weight: bold;">0개</span>
    </div>
    <div class="info-row">
      <span class="text-dim">상태:</span>
      <span id="status-text" style="color: var(--accent-success);">대기중</span>
    </div>
  </div>

  <script type="module" src="/js/admin/outdoor/admin_elevation_editor.js"></script>
</body>
</html>
