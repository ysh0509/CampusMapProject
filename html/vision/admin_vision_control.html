<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision Control Admin</title>
  <!-- Pretendard 폰트 적용 (시인성 향상) -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  <style>
    :root {
      /* Primary Colors - 선명하고 신뢰감 있는 블루 */
      --primary: #2563eb;
      --primary-light: #eff6ff;
      --primary-hover: #1d4ed8;
      
      /* Success/Danger - 명확한 상태 구분 */
      --success: #10b981;
      --success-light: #ecfdf5;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      
      /* Background & Surface - 입체감을 위한 레이어링 */
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      
      /* Shadow - 부드러운 입체감 */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      font-family: 'Pretendard', sans-serif; 
      background: var(--bg-body); 
      color: var(--text-main);
      line-height: 1.5;
    }

    .container { 
      padding: 24px; 
      display: grid; 
      grid-template-columns: 400px 1fr; 
      gap: 24px; 
      max-width: 1440px; 
      margin: 0 auto; 
    }

    /* Panel - 카드 스타일 개선 */
    .panel { 
      background: var(--bg-card); 
      border-radius: 16px; 
      padding: 24px; 
      box-shadow: var(--shadow-md); 
      border: 1px solid var(--border);
    }
    
    h3 { 
      margin: 0 0 20px 0; 
      font-size: 1.25rem; 
      font-weight: 700; 
      display: flex; 
      align-items: center; 
      gap: 10px;
      color: var(--text-main);
    }
    
    /* Form Section */
    .form-section { margin-bottom: 24px; }
    .section-label { 
      font-size: 0.75rem; 
      font-weight: 700; 
      color: var(--primary); /* 라벨에 포인트 컬러 적용 */
      text-transform: uppercase; 
      margin-bottom: 10px; 
      display: block;
      letter-spacing: 0.05em;
    }

    .row { display: flex; gap: 12px; margin-bottom: 16px; }
    .row > * { flex: 1; }
    
    /* Input Styling - 훨씬 깔끔하고 현대적인 느낌 */
    input, select, textarea {
      width: 100%; 
      border: 1px solid var(--border); 
      border-radius: 10px;
      padding: 10px 14px; 
      font-size: 14px; 
      outline: none; 
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      background: #fff;
    }
    input:focus, select:focus, textarea:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 0 4px var(--primary-light);
    }
    textarea { min-height: 180px; font-family: 'Fira Code', monospace; background: #f8fafc; }

    /* Buttons - 명확한 색상 대비와 Hover 효과 */
    button { 
      border: none; 
      border-radius: 10px; 
      padding: 10px 16px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 14px; 
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    button:active { transform: scale(0.96); }
    
    .btn-save { background: var(--primary); color: white; width: 100%; margin-top: 12px; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
    .btn-save:hover { background: var(--primary-hover); }
    
    .btn-delete { background: var(--danger-light); color: var(--danger); }
    .btn-delete:hover { background: var(--danger); color: white; }
    
    .btn-validate { background: #f1f5f9; color: #475569; }
    .btn-validate:hover { background: #e2e8f0; }
    
    .btn-new { background: #f1f5f9; color: var(--text-main); }
    
    .btn-success-outline { 
      background: var(--success-light); 
      color: var(--success); 
      border: 1px solid var(--success);
    }
    .btn-success-outline:hover { background: var(--success); color: white; }

    /* USB Group - 세련된 토글 버튼 스타일 */
    .usb-group { 
      display: flex; 
      background: #f1f5f9; 
      padding: 4px; 
      border-radius: 10px; 
      gap: 4px; 
    }
    .usb-group button { 
      flex: 1; 
      background: transparent; 
      color: var(--text-muted); 
      padding: 6px; 
      font-size: 12px;
    }
    .usb-group button.active { 
      background: white; 
      color: var(--primary); 
      box-shadow: var(--shadow-sm); 
    }

    /* List Container */
    .list-container { 
      max-height: 280px; 
      overflow-y: auto; 
      border: 1px solid var(--border); 
      border-radius: 12px; 
      margin-bottom: 20px; 
    }
    .list-item { 
      padding: 14px 16px; 
      border-bottom: 1px solid var(--border); 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      transition: background 0.2s;
    }
    .list-item:hover { background: var(--bg-gray); }
    .list-item.active { 
      background: var(--primary-light); 
      border-left: 4px solid var(--primary); 
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-on { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .dot-off { background: #cbd5e1; }
    .item-id { font-weight: 700; font-size: 14px; display: block; }
    .item-sub { font-size: 12px; color: var(--text-muted); }

    /* Video Preview - 몰입감 있는 디자인 */
    .video-wrap { 
      background: #000; 
      border-radius: 16px; 
      overflow: hidden; 
      position: relative; 
      aspect-ratio: 16/9; 
      box-shadow: var(--shadow-md);
    }
    .video-img { width: 100%; height: 100%; object-fit: contain; }
    .video-overlay { 
      position: absolute; top: 14px; left: 14px; 
      background: rgba(15, 23, 42, 0.7); 
      color: white; padding: 5px 12px; 
      border-radius: 20px; font-size: 12px; 
      backdrop-filter: blur(4px);
    }

    /* Message Box */
    #roi_msg { font-size: 13px; margin-top: 8px; font-weight: 500; }
    .ok { color: var(--success); }
    .err { color: var(--danger); }

    @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="admin-header"></div>

  <div class="container">
    <!-- Left Column: Configuration -->
    <div class="panel">
      <h3>⚙️ 카메라 설정</h3>
      
      <div class="form-section">
        <span class="section-label">기본 정보</span>
        <div class="row">
          <input id="camera_id" placeholder="Camera ID" />
          <input id="camera_name" placeholder="카메라 이름" />
        </div>
        <div class="row">
          <select id="node_scope">
            <option value="indoor">Indoor (실내)</option>
            <option value="outdoor">Outdoor (실외)</option>
          </select>
          <label style="display:flex;align-items:center;gap:8px; font-size:14px; cursor:pointer; margin:0;">
            <input type="checkbox" id="is_active" style="width:auto;" /> 활성 상태
          </label>
        </div>
      </div>

      <div class="form-section">
        <span class="section-label">영상 소스</span>
        <div class="row">
          <input id="video_source" placeholder="Source (0, 1, URL...)" />
          <button id="btn_preview" class="btn-validate" type="button">미리보기</button>
        </div>
        <div class="usb-group">
          <button id="btn_usb_0" class="btn-validate" type="button">USB 0</button>
          <button id="btn_usb_1" class="btn-validate" type="button">USB 1</button>
          <button id="btn_usb_2" class="btn-validate" type="button">USB 2</button>
        </div>
      </div>

      <div class="form-section">
        <span class="section-label">ROI 영역 (JSON)</span>
        <textarea id="roi_json"></textarea>
        <div id="roi_msg">ready</div>
      </div>

      <div class="btn-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button id="btn_new" class="btn-new" type="button">새로 만들기</button>
        <button id="btn_validate" class="btn-validate" type="button">ROI 검증</button>
        <button id="btn_save" class="btn-save" style="grid-column: span 2;" type="button">설정 저장하기</button>
        <button id="btn_delete" class="btn-delete" style="grid-column: span 2;" type="button">이 프로필 삭제</button>
      </div>
    </div>

    <!-- Right Column: List & Monitor -->
    <div class="panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin:0;">📋 프로필 목록 & 모니터링</h3>
        <button id="btn_set_active" class="btn-success-outline" type="button">✨ 현재 프로필 즉시 활성화</button>
      </div>

      <div class="list-container" id="profile_list">
        <!-- JS 렌더링 -->
      </div>

      <div class="form-section">
        <span class="section-label">실시간 모니터링</span>
        <div class="row">
          <input id="preview_url" placeholder="미리보기 URL 직접 입력" />
        </div>
        <div class="video-wrap">
          <div class="video-overlay" id="preview_overlay">No Stream</div>
          <img id="preview_img" class="video-img" alt="stream preview" />
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/vision/admin_vision_control.js"></script>
</body>
</html>
